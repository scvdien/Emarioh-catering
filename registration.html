<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Client registration for Emarioh Catering Services online booking reservation system.">
    <title>Client Registration | Emarioh Catering Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/auth.css?v=20260331f">
    <style>
        body.auth-page--register {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(191, 156, 104, 0.14), transparent 24%),
                radial-gradient(circle at bottom right, rgba(19, 70, 56, 0.08), transparent 20%),
                linear-gradient(180deg, #f6f1e9 0%, #f1ece4 55%, #ebe4d9 100%);
            color: #2b211c;
        }

        .register-shell {
            width: calc(100% - 1.5rem);
            min-height: 100vh;
            margin: 0 auto;
            padding: 0.85rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-panel {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding: 1rem;
            border: 1px solid rgba(183, 159, 120, 0.16);
            border-radius: 1.85rem;
            background: linear-gradient(180deg, rgba(255, 252, 247, 0.97), rgba(255, 250, 244, 0.95));
            box-shadow: 0 28px 70px rgba(59, 43, 26, 0.08);
        }

        .register-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(189, 168, 134, 0.2);
        }

        .register-brand {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            color: inherit;
            text-decoration: none;
        }

        .register-brand__mark {
            width: 3.35rem;
            flex: 0 0 auto;
        }

        .register-brand__mark img {
            width: 100%;
            display: block;
        }

        .register-brand__name {
            display: block;
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(1.75rem, 2.8vw, 2.35rem);
            line-height: 0.9;
            color: #174638;
        }

        .register-brand__sub {
            display: block;
            margin-top: 0.2rem;
            color: #b98d4b;
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .register-back {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.68rem 0.95rem;
            border: 1px solid rgba(23, 70, 56, 0.12);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.86);
            color: #486156;
            font-size: 0.84rem;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .register-back:hover {
            border-color: rgba(23, 70, 56, 0.22);
            background: #ffffff;
            color: #174638;
        }

        .register-content {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            padding-top: 0.9rem;
        }

        .register-heading {
            max-width: 450px;
            margin: 0 auto 0.9rem;
            text-align: center;
        }

        .register-eyebrow {
            margin: 0;
            color: #b58846;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.13em;
            text-transform: uppercase;
        }

        .register-heading h1 {
            margin: 0;
            font-family: "Manrope", sans-serif;
            font-size: clamp(1.02rem, 1.75vw, 1.16rem);
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #365447;
        }

        .register-heading p:last-child,
        .register-step-chip,
        .register-stage__copy,
        .register-badge,
        .register-field label,
        .register-input-wrap input,
        .register-inline-note,
        .register-note,
        .register-agree,
        .register-submit,
        .register-button,
        .register-footer {
            font-family: "Manrope", sans-serif;
        }

        .register-heading p:last-child {
            max-width: 24rem;
            margin: 0.45rem auto 0;
            color: #6f766f;
            font-size: 0.84rem;
            line-height: 1.55;
        }

        .register-steps {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.4rem;
            width: 100%;
            max-width: 460px;
            margin: 0 auto 0.75rem;
        }

        .register-step-chip {
            display: grid;
            justify-items: center;
            gap: 0.15rem;
            padding: 0.42rem 0.3rem;
            border: 1px solid rgba(183, 159, 120, 0.14);
            border-radius: 0.9rem;
            background: rgba(255, 251, 245, 0.82);
            color: #7b7f79;
            text-align: center;
        }

        .register-step-chip__count {
            display: grid;
            place-items: center;
            width: 1.55rem;
            height: 1.55rem;
            border-radius: 999px;
            background: rgba(185, 141, 75, 0.14);
            color: #9f7336;
            font-size: 0.72rem;
            font-weight: 800;
        }

        .register-step-chip strong {
            font-size: 0.73rem;
            font-weight: 800;
        }

        .register-step-chip span:last-child {
            display: none;
        }

        .register-step-chip.is-active {
            border-color: rgba(15, 90, 70, 0.26);
            background: rgba(241, 248, 244, 0.96);
            color: #174638;
        }

        .register-step-chip.is-active .register-step-chip__count,
        .register-step-chip.is-complete .register-step-chip__count {
            background: #0f5a46;
            color: #fffaf4;
        }

        .register-step-chip.is-complete {
            border-color: rgba(15, 90, 70, 0.18);
            color: #47675c;
        }

        .register-form {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
        }

        .register-stage {
            display: none;
            gap: 0.55rem;
            padding: 0.8rem;
            border: 1px solid rgba(183, 159, 120, 0.14);
            border-radius: 1.2rem;
            background: rgba(255, 253, 249, 0.9);
        }

        .register-stage.is-active {
            display: grid;
        }

        .register-stage__copy {
            margin: 0;
            color: #67756e;
            font-size: 0.74rem;
            line-height: 1.4;
            text-align: center;
        }

        .register-stage__copy strong {
            color: #174638;
            font-weight: 800;
        }

        .register-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.68rem;
        }

        .register-grid--password {
            align-items: start;
        }

        .register-field {
            display: grid;
            gap: 0.42rem;
        }

        .register-field label {
            color: #31463d;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .register-input-wrap {
            position: relative;
        }

        .register-input-wrap input {
            width: 100%;
            min-height: 3rem;
            padding: 0.76rem 0.9rem;
            border: 1px solid #e9dfd1;
            border-radius: 1rem;
            background: #fffdfa;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
            color: #33453d;
            font: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .register-input-wrap input::placeholder {
            color: #9ca19a;
        }

        .register-input-wrap input:focus {
            border-color: rgba(31, 88, 66, 0.34);
            box-shadow: 0 0 0 4px rgba(187, 145, 71, 0.1);
        }

        .register-input-wrap--otp input {
            text-align: center;
            letter-spacing: 0.32em;
            font-size: 1rem;
            font-weight: 800;
        }

        .register-input-wrap--password input {
            padding-right: 2.65rem;
        }

        .register-input-icon,
        .register-toggle-password {
            position: absolute;
            top: 50%;
            right: 0.82rem;
            transform: translateY(-50%);
        }

        .register-input-icon {
            color: #7e857d;
            font-size: 0.82rem;
            pointer-events: none;
        }

        .register-toggle-password {
            display: grid;
            place-items: center;
            width: 1.8rem;
            height: 1.8rem;
            padding: 0;
            border: 0;
            background: transparent;
            color: #727971;
            cursor: pointer;
        }

        .register-inline-note {
            margin: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            font-size: 0.72rem;
            line-height: 1.4;
            text-align: center;
            min-height: 1rem;
        }

        .register-inline-note--info {
            color: #728078;
        }

        .register-inline-note--success {
            color: #1b604b;
        }

        .register-inline-note--error {
            color: #9a4747;
        }

        .register-inline-note.is-hidden {
            display: none;
        }

        .register-agree {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin-top: 0.05rem;
            color: #6c726b;
            font-size: 0.74rem;
            line-height: 1.45;
        }

        .register-agree input {
            width: 0.95rem;
            height: 0.95rem;
            margin-top: 0.15rem;
            accent-color: #0d5945;
        }

        .register-agree a {
            color: #1d5a48;
            font-weight: 700;
            text-decoration: none;
        }

        .register-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.55rem;
            padding-top: 0.1rem;
        }

        .register-actions--otp {
            display: block;
            padding-top: 0.2rem;
        }

        .register-actions__links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.7rem;
        }

        .register-actions--password {
            padding-top: 0.35rem;
        }

        .register-submit,
        .register-button {
            min-height: 2.95rem;
            padding: 0.78rem 1.5rem;
            border-radius: 999px;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 800;
            cursor: pointer;
        }

        .register-submit {
            min-width: 180px;
            border: 0;
            background: linear-gradient(180deg, #0f5a46, #0a4b39);
            box-shadow: 0 16px 28px rgba(15, 90, 70, 0.2);
            color: #fffaf4;
        }

        .register-submit:hover {
            background: linear-gradient(180deg, #0d4f3f, #083f31);
        }

        .register-submit--otp {
            width: 100%;
        }

        .register-submit--password {
            min-width: 240px;
        }

        .register-button {
            border: 1px solid rgba(23, 70, 56, 0.14);
            background: rgba(255, 255, 255, 0.9);
            color: #486156;
        }

        .register-button--ghost {
            background: transparent;
        }

        .register-button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .register-text-button {
            padding: 0;
            border: 0;
            background: transparent;
            color: #4d665c;
            font: inherit;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
        }

        .register-text-button:hover {
            color: #174638;
        }

        .register-text-button:disabled {
            color: #98a49d;
            opacity: 1;
            cursor: default;
        }

        .register-text-link {
            padding: 0;
            border: 0;
            background: transparent;
            color: #6b766f;
            font: inherit;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
        }

        .register-text-link:hover {
            color: #174638;
        }

        .register-text-link--password {
            display: block;
            width: fit-content;
            margin: 0.55rem auto 0;
        }

        .register-footer {
            margin-top: 0.8rem;
            color: #708079;
            font-size: 0.75rem;
            text-align: center;
        }

        .register-footer a {
            color: #1d5a48;
            font-weight: 800;
            text-decoration: none;
        }

        @media (max-width: 767.98px) {
            .register-shell {
                width: calc(100% - 0.75rem);
                padding: 0.5rem 0;
            }

            .register-panel {
                padding: 1rem;
                border-radius: 1.35rem;
            }

            .register-topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .register-content {
                max-width: 100%;
                padding-top: 1rem;
            }

            .register-heading {
                max-width: 100%;
                margin-bottom: 0.85rem;
            }

            .register-heading h1 {
                font-size: clamp(0.98rem, 4.2vw, 1.08rem);
            }

            .register-steps {
                gap: 0.35rem;
            }

            .register-step-chip {
                padding: 0.55rem 0.35rem;
            }

            .register-step-chip strong {
                font-size: 0.7rem;
            }

            .register-step-chip span:last-child {
                font-size: 0.64rem;
            }

            .register-grid {
                grid-template-columns: 1fr;
            }

            .register-submit,
            .register-button {
                width: 100%;
            }

            .register-actions__links {
                flex-direction: column;
                gap: 0.45rem;
            }

            .register-text-button {
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body class="auth-page auth-page--register">
    <main class="register-shell">
        <section class="register-panel" aria-label="Registration form">
            <div class="register-topbar">
                <a href="public-page.html" class="register-brand" aria-label="Back to Emarioh public page">
                    <span class="register-brand__mark">
                        <img src="assets/images/logo.jpg" alt="Emarioh Catering Services logo">
                    </span>
                    <span>
                        <span class="register-brand__name">EMARIOH</span>
                        <span class="register-brand__sub">Catering Services</span>
                    </span>
                </a>
                <a class="register-back" href="public-page.html"><i class="bi bi-arrow-left"></i><span>Back to website</span></a>
            </div>

            <div class="register-content">
                <div class="register-heading">
                    <h1>Create an Account</h1>
                    <p>Sign up in 3 easy steps.</p>
                </div>

                <div class="register-steps" aria-label="Registration steps">
                    <div class="register-step-chip is-active" data-step-indicator="1">
                        <span class="register-step-chip__count">1</span>
                        <strong>Details</strong>
                        <span>Start</span>
                    </div>
                    <div class="register-step-chip" data-step-indicator="2">
                        <span class="register-step-chip__count">2</span>
                        <strong>OTP</strong>
                        <span>Verify</span>
                    </div>
                    <div class="register-step-chip" data-step-indicator="3">
                        <span class="register-step-chip__count">3</span>
                        <strong>Password</strong>
                        <span>Finish</span>
                    </div>
                </div>

                <form class="register-form" id="registrationForm" action="client-dashboard.html" method="get" novalidate>
                    <section class="register-stage is-active" data-register-step="1">
                        <div class="register-grid">
                            <div class="register-field">
                                <label for="registerName">Full Name</label>
                                <div class="register-input-wrap">
                                    <input id="registerName" name="full_name" type="text" placeholder="Maria Santos" autocomplete="name" required>
                                </div>
                            </div>
                            <div class="register-field">
                                <label for="registerPhone">Mobile Number</label>
                                <div class="register-input-wrap">
                                    <input id="registerPhone" name="mobile" type="tel" inputmode="numeric" placeholder="0917 555 2481" autocomplete="tel" required>
                                </div>
                            </div>
                        </div>

                        <label class="register-agree" for="agreeTerms">
                            <input id="agreeTerms" name="agree_terms" type="checkbox" required>
                            <span>I agree to the <a href="public-page.html#contact">Terms of Service</a> and <a href="public-page.html#contact">Privacy Policy</a>.</span>
                        </label>

                        <div class="register-actions">
                            <button class="register-submit" type="button" data-send-otp>Send OTP</button>
                        </div>
                    </section>

                    <section class="register-stage" data-register-step="2" hidden>
                        <p class="register-stage__copy">Enter the code sent to <strong data-otp-target>your mobile number</strong>.</p>

                        <div class="register-field">
                            <div class="register-input-wrap register-input-wrap--otp">
                                <input id="registerOtp" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter code" maxlength="6">
                            </div>
                        </div>

                        <p class="register-inline-note register-inline-note--info is-hidden" data-otp-feedback aria-live="polite"></p>

                        <div class="register-actions register-actions--otp">
                            <button class="register-submit register-submit--otp" type="button" data-verify-otp>Verify OTP</button>
                            <div class="register-actions__links">
                                <button class="register-text-button" type="button" data-resend-otp>Resend</button>
                                <button class="register-text-button" type="button" data-change-number>Edit Number</button>
                            </div>
                        </div>
                    </section>

                    <section class="register-stage" data-register-step="3" hidden>
                        <p class="register-stage__copy"><strong data-password-target>Your mobile number</strong> verified</p>

                        <div class="register-grid register-grid--password">
                            <div class="register-field">
                                <label for="registerPassword">Password</label>
                                <div class="register-input-wrap register-input-wrap--password">
                                    <input id="registerPassword" name="password" type="password" placeholder="Create a strong password" minlength="8" autocomplete="new-password" required>
                                    <button class="register-toggle-password" type="button" data-toggle-password="registerPassword" aria-label="Show password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="register-field">
                                <label for="registerConfirmPassword">Confirm Password</label>
                                <div class="register-input-wrap register-input-wrap--password">
                                    <input id="registerConfirmPassword" type="password" placeholder="Re-enter your password" minlength="8" autocomplete="new-password" required>
                                    <button class="register-toggle-password" type="button" data-toggle-password="registerConfirmPassword" aria-label="Show password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="register-actions register-actions--password">
                            <button class="register-submit register-submit--password" type="submit">Create Account</button>
                        </div>
                        <button class="register-text-link register-text-link--password" type="button" data-back-to-otp>Back</button>
                    </section>
                </form>

                <p class="register-footer">Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var form = document.getElementById("registrationForm");
            var fullNameInput = document.getElementById("registerName");
            var mobileInput = document.getElementById("registerPhone");
            var agreeInput = document.getElementById("agreeTerms");
            var otpInput = document.getElementById("registerOtp");
            var passwordInput = document.getElementById("registerPassword");
            var confirmPasswordInput = document.getElementById("registerConfirmPassword");
            var stepPanels = Array.prototype.slice.call(document.querySelectorAll("[data-register-step]"));
            var stepIndicators = Array.prototype.slice.call(document.querySelectorAll("[data-step-indicator]"));
            var otpTarget = document.querySelector("[data-otp-target]");
            var passwordTarget = document.querySelector("[data-password-target]");
            var otpFeedback = document.querySelector("[data-otp-feedback]");
            var resendOtpButton = document.querySelector("[data-resend-otp]");
            var sendOtpButton = document.querySelector("[data-send-otp]");
            var verifyOtpButton = document.querySelector("[data-verify-otp]");
            var changeNumberButton = document.querySelector("[data-change-number]");
            var backToOtpButton = document.querySelector("[data-back-to-otp]");
            var otpVerified = false;
            var otpCountdown = 0;
            var otpTimerId = null;

            function setStep(step) {
                stepPanels.forEach(function (panel) {
                    var isActive = Number(panel.getAttribute("data-register-step")) === step;
                    panel.hidden = !isActive;
                    panel.classList.toggle("is-active", isActive);
                });

                stepIndicators.forEach(function (indicator) {
                    var indicatorStep = Number(indicator.getAttribute("data-step-indicator"));
                    indicator.classList.toggle("is-active", indicatorStep === step);
                    indicator.classList.toggle("is-complete", indicatorStep < step);
                });
            }

            function maskMobile(value) {
                var digits = value.replace(/\D/g, "");

                if (!digits) {
                    return "your mobile number";
                }

                if (digits.length <= 4) {
                    return digits;
                }

                return digits.slice(0, 4) + " *** " + digits.slice(-4);
            }

            function validateStepOne() {
                fullNameInput.setCustomValidity("");
                mobileInput.setCustomValidity("");
                agreeInput.setCustomValidity("");

                if (!fullNameInput.value.trim()) {
                    fullNameInput.reportValidity();
                    return false;
                }

                if (!mobileInput.value.trim()) {
                    mobileInput.reportValidity();
                    return false;
                }

                if (mobileInput.value.replace(/\D/g, "").length < 10) {
                    mobileInput.setCustomValidity("Enter a valid mobile number.");
                    mobileInput.reportValidity();
                    return false;
                }

                if (!agreeInput.checked) {
                    agreeInput.setCustomValidity("Please agree to continue.");
                    agreeInput.reportValidity();
                    return false;
                }

                return true;
            }

            function setOtpFeedback(type, message) {
                if (!message) {
                    otpFeedback.className = "register-inline-note register-inline-note--info is-hidden";
                    otpFeedback.textContent = "";
                    return;
                }

                otpFeedback.className = "register-inline-note register-inline-note--" + type;
                otpFeedback.textContent = message;
            }

            function clearOtpTimer() {
                if (otpTimerId) {
                    clearInterval(otpTimerId);
                    otpTimerId = null;
                }
            }

            function updateResendState() {
                if (otpCountdown > 0) {
                    resendOtpButton.disabled = true;
                    resendOtpButton.textContent = "Resend in " + otpCountdown + "s";
                    return;
                }

                resendOtpButton.disabled = false;
                resendOtpButton.textContent = "Resend";
            }

            function startOtpTimer() {
                clearOtpTimer();
                otpCountdown = 45;
                updateResendState();

                otpTimerId = window.setInterval(function () {
                    otpCountdown -= 1;

                    if (otpCountdown <= 0) {
                        clearOtpTimer();
                        otpCountdown = 0;
                    }

                    updateResendState();
                }, 1000);
            }

            function sendOtp(isResend) {
                otpVerified = false;
                otpInput.value = "";
                otpTarget.textContent = maskMobile(mobileInput.value);
                passwordTarget.textContent = maskMobile(mobileInput.value);
                setOtpFeedback("", "");
                setStep(2);
                startOtpTimer();
                otpInput.focus();
            }

            function verifyOtp() {
                var enteredOtp = otpInput.value.replace(/\D/g, "");

                if (enteredOtp.length !== 6) {
                    setOtpFeedback("error", "Enter the 6-digit code.");
                    otpInput.focus();
                    return;
                }

                otpVerified = true;
                clearOtpTimer();
                setOtpFeedback("", "");
                setStep(3);
                passwordInput.focus();
            }

            function validatePasswordStep() {
                passwordInput.setCustomValidity("");
                confirmPasswordInput.setCustomValidity("");

                if (!passwordInput.value) {
                    passwordInput.reportValidity();
                    return false;
                }

                if (passwordInput.value.length < 8) {
                    passwordInput.setCustomValidity("Password must be at least 8 characters.");
                    passwordInput.reportValidity();
                    return false;
                }

                if (!confirmPasswordInput.value) {
                    confirmPasswordInput.reportValidity();
                    return false;
                }

                if (passwordInput.value !== confirmPasswordInput.value) {
                    confirmPasswordInput.setCustomValidity("Passwords do not match.");
                    confirmPasswordInput.reportValidity();
                    return false;
                }

                return true;
            }

            sendOtpButton.addEventListener("click", function () {
                if (validateStepOne()) {
                    sendOtp(false);
                }
            });

            resendOtpButton.addEventListener("click", function () {
                sendOtp(true);
            });

            verifyOtpButton.addEventListener("click", function () {
                verifyOtp();
            });

            changeNumberButton.addEventListener("click", function () {
                otpVerified = false;
                clearOtpTimer();
                setStep(1);
                mobileInput.focus();
            });

            backToOtpButton.addEventListener("click", function () {
                setStep(2);
                otpInput.focus();
            });

            otpInput.addEventListener("input", function () {
                otpInput.value = otpInput.value.replace(/\D/g, "").slice(0, 6);
            });

            mobileInput.addEventListener("input", function () {
                mobileInput.setCustomValidity("");
            });

            agreeInput.addEventListener("change", function () {
                agreeInput.setCustomValidity("");
            });

            passwordInput.addEventListener("input", function () {
                passwordInput.setCustomValidity("");
                confirmPasswordInput.setCustomValidity("");
            });

            confirmPasswordInput.addEventListener("input", function () {
                confirmPasswordInput.setCustomValidity("");
            });

            document.querySelectorAll("[data-toggle-password]").forEach(function (button) {
                button.addEventListener("click", function () {
                    var input = document.getElementById(button.getAttribute("data-toggle-password"));

                    if (!input) {
                        return;
                    }

                    var isPassword = input.type === "password";
                    input.type = isPassword ? "text" : "password";
                    button.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
                    button.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
                });
            });

            form.addEventListener("submit", function (event) {
                event.preventDefault();

                if (!validateStepOne()) {
                    setStep(1);
                    return;
                }

                if (!otpVerified) {
                    setStep(2);
                    setOtpFeedback("error", "Verify your OTP first.");
                    return;
                }

                if (!validatePasswordStep()) {
                    setStep(3);
                    return;
                }

                window.location.href = form.getAttribute("action");
            });
        }());
    </script>
</body>
</html>
